<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CMS Panel - Batrisi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #ea580c; --dark: #0f172a; --sidebar: #1e293b; --bg: #f1f5f9; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; }
        .nav-btn { background: none; border: none; color: #cbd5e1; padding: 15px 20px; text-align: left; font-size: 15px; cursor: pointer; border-left: 4px solid transparent; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--primary); }

        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow:hidden;}
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        td img { height: 50px; width: 70px; border-radius: 6px; object-fit: cover; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }

        /* Multi Upload Progress */
        .progress-box { display:none; background:#e0f2fe; border:1px solid #bae6fd; padding:15px; border-radius:8px; text-align:center; margin-top:10px; font-weight:bold; color:#0369a1; }
        .drive-note { font-size: 11px; color: #ef4444; margin-top: 5px; font-weight: bold;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding:25px; text-align:center;"><h2>Batrisi CMS</h2></div>
        <button class="nav-btn active" onclick="initCMS('gallery', 'Gallery (Multi Image)')">Manage Gallery</button>
        <button class="nav-btn" onclick="initCMS('media', 'Media (Multi Image)')">Manage Media</button>
        <button class="nav-btn" onclick="initCMS('events', 'Events')">Manage Events</button>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <h1 id="cms-title">Manage Gallery</h1>
            <button class="btn-add" onclick="openAddModal()">+ Add New Record</button>
        </div>
        <table>
            <thead><tr><th>Title / Details</th><th>Images</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="modal" id="cmsModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:20px;">Add/Edit Record</h2>
            <div id="dynamicFields"></div>
            
            <div class="progress-box" id="uploadProgress">Uploading: 0 / 0 Files</div>

            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:25px;">
                <button onclick="closeCMSModal()" style="padding:10px 20px; cursor:pointer;">Cancel</button>
                <button id="saveBtn" onclick="saveDataToFirebase()" style="padding:10px 25px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700;">SAVE RECORD</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDbZ4T8264CDQ5LSoH_4L0luB5VKQbiqkU", authDomain: "batrisi-latest-app.firebaseapp.com", projectId: "batrisi-latest-app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const IMGBB_API_KEY = "77c6ecbe6786edef58354da6ff43fa5b";

        // SCHEMA WITH MULTI-IMAGE SUPPORT
        const schemas = {
            'gallery': [ {key:'title', label:'Album Name'}, {key:'images', label:'Upload Multiple Images (Select 100+ at once)', isMultiFile:true} ],
            'media': [ {key:'title', label:'News Title'}, {key:'date', label:'Date'}, {key:'images', label:'Upload Newspaper Pages', isMultiFile:true} ],
            'events': [ {key:'title', label:'Event Title'}, {key:'desc', label:'Description'}, {key:'image', label:'Single Image', isFile:true} ]
        };

        let currentCol = 'gallery';
        let uploadedUrlsArray = []; // Store multiple URLs
        let currentEditId = null; 
        window.tableData = {}; 

        function initCMS(col, title) {
            currentCol = col;
            document.getElementById('cms-title').innerText = "Manage " + title;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            fetchTableData();
        }

        function fetchTableData() {
            db.collection(currentCol).orderBy('timestamp', 'desc').onSnapshot(snap => {
                const body = document.getElementById('tableBody'); body.innerHTML = "";
                window.tableData = {}; 
                snap.forEach(doc => {
                    const d = doc.data(); window.tableData[doc.id] = d; 
                    
                    // Show Cover image + count
                    let cover = (d.images && d.images.length>0) ? d.images[0] : (d.image || 'https://via.placeholder.com/40');
                    let countText = (d.images && d.images.length>1) ? `<br><small>+${d.images.length - 1} more</small>` : '';

                    body.innerHTML += `<tr>
                        <td><b>${d.title}</b></td>
                        <td><img src="${cover}">${countText}</td>
                        <td>
                            <button onclick="deleteDoc('${doc.id}')" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-trash"></i> Delete</button>
                        </td>
                    </tr>`;
                });
            });
        }

        function openAddModal() {
            currentEditId = null; uploadedUrlsArray = [];
            generateModalFields();
            document.getElementById('cmsModal').style.display = 'flex';
        }

        function generateModalFields() {
            const fields = schemas[currentCol];
            let html = "";
            
            fields.forEach(f => {
                if(f.isMultiFile) {
                    html += `<div class="form-group" style="background:#f8fafc; padding:15px; border:1px solid #cbd5e1;">
                        <label>${f.label}</label>
                        <input type="file" multiple accept="image/*" onchange="handleBulkUpload(this)">
                        <p class="drive-note">OR Paste Google Drive Link (We will auto-fix it):</p>
                        <input type="text" id="drive_link" placeholder="https://drive.google.com/file/d/....">
                    </div>`;
                } else if(f.isFile) {
                    html += `<div class="form-group"><label>${f.label}</label><input type="file" onchange="handleSingleUpload(this)"></div>`;
                } else {
                    html += `<div class="form-group"><label>${f.label}</label><input type="text" id="f_${f.key}"></div>`;
                }
            });
            document.getElementById('dynamicFields').innerHTML = html;
        }

        // AUTO FIX GOOGLE DRIVE LINKS
        function convertDriveLink(url) {
            if(!url) return "";
            if(url.includes("drive.google.com/file/d/")) {
                let id = url.split("/d/")[1].split("/")[0];
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        // BULK UPLOAD LOGIC
        async function handleBulkUpload(el) {
            const files = el.files; if(!files.length) return;
            const btn = document.getElementById('saveBtn'); btn.disabled = true;
            const prog = document.getElementById('uploadProgress'); prog.style.display = 'block';

            uploadedUrlsArray = [];
            let successCount = 0;

            for(let i=0; i<files.length; i++) {
                prog.innerText = `Uploading: ${i+1} of ${files.length} Files... Please Wait!`;
                const fd = new FormData(); fd.append("image", files[i]);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                    const data = await res.json();
                    if(data.data && data.data.url) {
                        uploadedUrlsArray.push(data.data.url);
                        successCount++;
                    }
                } catch(e) { console.log("Failed", i); }
            }
            prog.innerText = `Upload Complete! (${successCount} Images Ready)`;
            prog.style.color = "green";
            btn.disabled = false;
        }

        // SINGLE UPLOAD (For Events)
        async function handleSingleUpload(el) {
            const file = el.files[0]; if(!file) return;
            const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerText="UPLOADING...";
            const fd = new FormData(); fd.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const data = await res.json();
                uploadedUrlsArray = [data.data.url];
            } catch(e) {}
            btn.disabled = false; btn.innerText="SAVE RECORD";
        }

        // SAVE DATA
        async function saveDataToFirebase() {
            const btn = document.getElementById('saveBtn'); btn.innerText = "SAVING..."; btn.disabled = true;
            let dataObj = {};

            schemas[currentCol].forEach(f => {
                if(f.isMultiFile) {
                    let dLink = document.getElementById('drive_link') ? document.getElementById('drive_link').value : "";
                    if(dLink) uploadedUrlsArray.push(convertDriveLink(dLink));
                    dataObj[f.key] = uploadedUrlsArray; // Saves Array of links
                } 
                else if (f.isFile) {
                    dataObj[f.key] = uploadedUrlsArray[0] || ""; // Single link
                }
                else {
                    dataObj[f.key] = document.getElementById('f_'+f.key).value;
                }
            });

            dataObj.timestamp = Date.now();
            await db.collection(currentCol).add(dataObj);
            
            closeCMSModal();
            btn.innerText = "SAVE RECORD"; btn.disabled = false;
        }

        function deleteDoc(id) { if(confirm("Delete this?")) db.collection(currentCol).doc(id).delete(); }
        function closeCMSModal() { document.getElementById('cmsModal').style.display = 'none'; document.getElementById('uploadProgress').style.display='none';}

        initCMS('gallery', 'Gallery');
    </script>
</body>
</html>
