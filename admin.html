<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CMS Panel - Batrisi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK (Only Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #ea580c; --dark: #0f172a; --sidebar: #1e293b; --bg: #f1f5f9; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .login-box input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        .login-box button { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { background: none; border: none; color: #cbd5e1; padding: 15px 20px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; width: 100%; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--primary); }

        /* Main */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        td img { height: 40px; width: 40px; border-radius: 6px; object-fit: cover; }

        /* Modal - Simplified */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 12px; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        
        .preview-img { width: 100%; height: 200px; object-fit: cover; margin-top: 10px; border-radius: 8px; display: none; border: 2px solid #e2e8f0; }
        
        #toast { position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white; padding: 15px 25px; border-radius: 8px; opacity: 0; transition: 0.4s ease; z-index: 9999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-bottom:20px;">Admin CMS Login</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPwd" placeholder="Password">
            <button onclick="adminLogin()" style="width:100%;">Login to Dashboard</button>
            <p id="loginError" style="color:red; display:none; margin-top:10px;">Invalid Credentials.</p>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding:25px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:center;"><h2>Batrisi CMS</h2></div>
        <button class="nav-btn active" onclick="initCMS('events', 'Events')">Manage Events</button>
        <button class="nav-btn" onclick="initCMS('about', 'About Us')">Manage About Us</button>
        <button class="nav-btn" onclick="initCMS('gallery', 'Gallery')">Manage Gallery</button>
        <button class="nav-btn" onclick="initCMS('committee', 'Committee')">Manage Committee</button>
        <button class="nav-btn" onclick="initCMS('downloads', 'Downloads')">Manage Downloads</button>
        <button class="nav-btn" style="margin-top:auto; color:red;" onclick="location.reload()">Logout</button>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <h1 id="cms-title">Manage Events</h1>
            <button class="btn-add" onclick="openAddModal()">+ Add New Record</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>Record Info</th><th>Media</th><th>Actions</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="cmsModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:20px;">Add/Edit Record</h2>
            
            <div id="dynamicFields">
                <!-- Fields generate here -->
            </div>

            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:25px;">
                <button onclick="closeCMSModal()" style="padding:10px 20px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer;">Cancel</button>
                <button id="saveBtn" onclick="saveDataToFirebase()" style="padding:10px 25px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:15px;">SAVE RECORD</button>
            </div>
        </div>
    </div>

    <div id="toast">Success!</div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyDbZ4T8264CDQ5LSoH_4L0luB5VKQbiqkU",
            authDomain: "batrisi-latest-app.firebaseapp.com",
            projectId: "batrisi-latest-app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const IMGBB_API_KEY = "77c6ecbe6786edef58354da6ff43fa5b";

        // SCHEMA UPDATED FOR DOWNLOADS (Added 'desc' field)
        const schemas = {
            'events': [ {key:'title', label:'Event Title'}, {key:'date', label:'Event Date'}, {key:'desc', label:'Description', isArea:true}, {key:'image', label:'Image', isFile:true} ],
            'about': [ {key:'title', label:'Heading Title (e.g. Shree Batrisi Jain...)'}, {key:'desc', label:'Full About Description', isArea:true} ], 
            'gallery': [ {key:'title', label:'Caption'}, {key:'image', label:'Image', isFile:true} ],
            'committee': [ {key:'name', label:'Full Name'}, {key:'position', label:'Position'}, {key:'native', label:'Native Village'}, {key:'phone', label:'Mobile Number'}, {key:'photo', label:'Passport Photo', isFile:true} ],
            'downloads': [ {key:'title', label:'Document Title'}, {key:'desc', label:'Form Description (Details about PDF)', isArea:true}, {key:'file', label:'PDF Link (Google Drive)'} ]
        };

        let currentCol = 'events';
        let uploadedUrl = "";
        let currentEditId = null; 
        window.tableData = {}; 

        function adminLogin() {
            if(document.getElementById('adminUser').value==='Batrisi' && document.getElementById('adminPwd').value==='Bat@3232')
                document.getElementById('login-overlay').style.display='none';
            else document.getElementById('loginError').style.display='block';
        }

        function initCMS(col, title) {
            currentCol = col;
            document.getElementById('cms-title').innerText = "Manage " + title;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            fetchTableData();
        }

        function fetchTableData() {
            const body = document.getElementById('tableBody');
            db.collection(currentCol).orderBy('timestamp', 'desc').onSnapshot(snap => {
                body.innerHTML = "";
                window.tableData = {}; 
                snap.forEach(doc => {
                    const d = doc.data();
                    window.tableData[doc.id] = d; 
                    
                    // Fixed Image Display for Documents
                    let mediaHtml = '';
                    if(d.image || d.photo) mediaHtml = `<img src="${d.image || d.photo}" onerror="this.src='https://via.placeholder.com/40'">`;
                    else if(d.file) mediaHtml = `<i class="fa-solid fa-file-pdf" style="font-size:30px; color:#ef4444;"></i>`;
                    else mediaHtml = `<i class="fa-solid fa-file-lines" style="font-size:30px; color:gray;"></i>`;

                    body.innerHTML += `<tr>
                        <td><b>${d.title || d.name || 'No Name'}</b><br><small style="color:gray;">${(d.desc || '').substring(0,40)}...</small></td>
                        <td>${mediaHtml}</td>
                        <td>
                            <button onclick="editDoc('${doc.id}')" style="color:#2563eb; border:none; background:none; cursor:pointer; font-weight:bold; margin-right:15px;"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                            <button onclick="deleteDoc('${doc.id}')" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-trash"></i> Delete</button>
                        </td>
                    </tr>`;
                });
            });
        }

        // ADD NEW RECORD
        function openAddModal() {
            currentEditId = null; 
            document.getElementById('modalTitle').innerText = "Add New Record";
            generateModalFields();
        }

        // EDIT EXISTING RECORD
        function editDoc(id) {
            currentEditId = id;
            document.getElementById('modalTitle').innerText = "Edit Record";
            generateModalFields();
            
            const data = window.tableData[id];
            
            setTimeout(() => {
                schemas[currentCol].forEach(f => {
                    if(f.isFile) {
                        uploadedUrl = data[f.key] || "";
                        document.getElementById('manual_link').value = uploadedUrl;
                        updatePreview(uploadedUrl);
                    } else if(document.getElementById('f_'+f.key)) {
                        document.getElementById('f_'+f.key).value = data[f.key] || "";
                    }
                });
            }, 50);
        }

        // GENERATE HTML FIELDS
        function generateModalFields() {
            const fields = schemas[currentCol];
            let html = "";
            uploadedUrl = ""; 
            
            fields.forEach(f => {
                if(f.isFile) {
                    html += `<div class="form-group" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #cbd5e1;">
                        <label>${f.label}</label>
                        <input type="file" id="file_input" onchange="handleImgUpload(this)">
                        <p style="text-align:center; font-size:10px; margin:5px 0; font-weight:bold;">--- OR ---</p>
                        <input type="text" id="manual_link" placeholder="Paste Direct Image URL here" oninput="updatePreview(this.value)">
                        <img id="modal_prev" class="preview-img">
                    </div>`;
                } else if(f.isArea) {
                    html += `<div class="form-group"><label>${f.label}</label><textarea id="f_${f.key}" rows="4"></textarea></div>`;
                } else {
                    html += `<div class="form-group"><label>${f.label}</label><input type="text" id="f_${f.key}"></div>`;
                }
            });
            document.getElementById('dynamicFields').innerHTML = html;
            document.getElementById('cmsModal').style.display = 'flex';
        }

        async function handleImgUpload(el) {
            const file = el.files[0]; if(!file) return;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "UPLOADING..."; btn.disabled = true;
            
            const fd = new FormData(); fd.append("image", file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const data = await res.json();
                uploadedUrl = data.data.url;
                updatePreview(uploadedUrl);
            } catch(e) { alert("Upload Failed!"); }
            
            btn.innerText = "SAVE RECORD"; btn.disabled = false;
        }

        function updatePreview(url) {
            const img = document.getElementById('modal_prev');
            if(url) { img.src = url; img.style.display = 'block'; }
            else { img.style.display = 'none'; }
        }

        async function saveDataToFirebase() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;

            const fields = schemas[currentCol];
            let dataObj = {};

            fields.forEach(f => {
                if(f.isFile) {
                    const manual = document.getElementById('manual_link').value;
                    dataObj[f.key] = manual || uploadedUrl || "";
                } else {
                    dataObj[f.key] = document.getElementById('f_'+f.key).value;
                }
            });

            try {
                if (currentEditId) {
                    await db.collection(currentCol).doc(currentEditId).update(dataObj);
                } else {
                    dataObj.timestamp = Date.now(); 
                    await db.collection(currentCol).add(dataObj);
                }
                closeCMSModal();
                showToast();
            } catch(e) {
                alert("Database Error! Please check your connection.");
            }

            btn.innerText = "SAVE RECORD"; btn.disabled = false;
        }

        function deleteDoc(id) { if(confirm("Are you sure you want to delete this record?")) db.collection(currentCol).doc(id).delete(); }
        function closeCMSModal() { document.getElementById('cmsModal').style.display = 'none'; }
        function showToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
        
        // Start App
        initCMS('events', 'Events');
    </script>
</body>
</html>
