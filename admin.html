<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CMS Panel - Batrisi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK (Only Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root { --primary: #ea580c; --dark: #0f172a; --sidebar: #1e293b; --bg: #f1f5f9; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        /* Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .login-box input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        .login-box button { width: 100%; background: var(--primary); color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-btn { background: none; border: none; color: #cbd5e1; padding: 15px 20px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; width: 100%; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--primary); }

        /* Main */
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .btn-add { background: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px;}
        
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f8fafc; font-weight: 700; color: #475569; }
        td img { height: 50px; width: 70px; border-radius: 6px; object-fit: cover; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 5000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; position: relative; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        
        .preview-img { width: 100%; height: 200px; object-fit: cover; margin-top: 10px; border-radius: 8px; display: none; border: 2px solid #e2e8f0; }
        
        /* Upload Progress Box */
        .progress-box { display:none; background:#e0f2fe; border:1px solid #bae6fd; padding:15px; border-radius:8px; text-align:center; margin-top:10px; font-weight:bold; color:#0369a1; }

        #toast { position: fixed; bottom: 30px; right: 30px; background: #10b981; color: white; padding: 15px 25px; border-radius: 8px; opacity: 0; transition: 0.4s ease; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); font-weight: 600;}
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-bottom:20px;">Admin CMS Login</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPwd" placeholder="Password">
            <button onclick="adminLogin()" style="width:100%;">Login to Dashboard</button>
            <p id="loginError" style="color:red; display:none; margin-top:10px;">Invalid Credentials.</p>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div style="padding:25px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:center;"><h2>Batrisi CMS</h2></div>
        <button class="nav-btn active" onclick="initCMS('events', 'Events')">Manage Events</button>
        <button class="nav-btn" onclick="initCMS('media', 'Media (Multi Image)')">Manage Media</button> 
        <button class="nav-btn" onclick="initCMS('about', 'About Us')">Manage About Us</button>
        <button class="nav-btn" onclick="initCMS('gallery', 'Gallery (Multi Image)')">Manage Gallery</button>
        <button class="nav-btn" onclick="initCMS('committee', 'Committee')">Manage Committee</button>
        <button class="nav-btn" onclick="initCMS('downloads', 'Downloads')">Manage Downloads</button>
        
        <!-- Manage Members Button -->
        <button class="nav-btn" style="border-top: 1px solid rgba(255,255,255,0.1);" onclick="initCMS('members', 'Members Database (CSV)')"><i class="fa-solid fa-users"></i> Manage Members</button>

        <button class="nav-btn" style="margin-top:auto; color:red;" onclick="location.reload()">Logout</button>
    </div>

    <div class="main-content">
        <div class="toolbar" id="topToolbar">
            <div>
                <h1 id="cms-title">Manage Events</h1>
            </div>
            
            <button class="btn-add" id="standardAddBtn" onclick="openAddModal()">+ Add New Record</button>
            
            <!-- CSV Upload Container -->
            <div id="csvUploadBtnContainer" style="display:none; gap: 15px; align-items: center;">
                <button class="btn-add" style="background:#ef4444;" onclick="deleteAllMembers()"><i class="fa-solid fa-trash-can"></i> Delete All Data</button>
                
                <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleCSVUpload(this)">
                <button class="btn-add" style="background:#10b981;" onclick="document.getElementById('csvFileInput').click()"><i class="fa-solid fa-file-csv"></i> Upload CSV DB</button>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr id="tableHeaders"><th>Record Info</th><th>Media</th><th>Actions</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="cmsModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:20px;">Add/Edit Record</h2>
            <div id="dynamicFields"></div>
            <div class="progress-box" id="uploadProgress">Uploading: 0 / 0 Files</div>
            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:25px;">
                <button onclick="closeCMSModal()" style="padding:10px 20px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer;">Cancel</button>
                <button id="saveBtn" onclick="saveDataToFirebase()" style="padding:10px 25px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:15px;">SAVE RECORD</button>
            </div>
        </div>
    </div>

    <div id="toast">Success!</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDbZ4T8264CDQ5LSoH_4L0luB5VKQbiqkU", authDomain: "batrisi-latest-app.firebaseapp.com", projectId: "batrisi-latest-app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const IMGBB_API_KEY = "77c6ecbe6786edef58354da6ff43fa5b";

        const schemas = {
            'events': [ {key:'title', label:'Event Title'}, {key:'date', label:'Event Date'}, {key:'desc', label:'Description', isArea:true}, {key:'image', label:'Image', isFile:true} ],
            'media': [ {key:'title', label:'Media / News Title'}, {key:'date', label:'Date (e.g. 15 Aug 2026)'}, {key:'images', label:'Upload Newspaper Image(s) - Select Multiple', isMultiFile:true} ],
            'about': [ {key:'title', label:'Heading Title'}, {key:'desc', label:'Full About Description', isArea:true} ], 
            'gallery': [ {key:'title', label:'Album Caption'}, {key:'images', label:'Upload Multiple Images (Select 100+ at once)', isMultiFile:true} ],
            'committee': [ {key:'name', label:'Full Name'}, {key:'position', label:'Position'}, {key:'native', label:'Native Village'}, {key:'phone', label:'Mobile Number'}, {key:'photo', label:'Passport Photo', isFile:true} ],
            'downloads': [ {key:'title', label:'Document Title'}, {key:'desc', label:'Form Description', isArea:true}, {key:'file', label:'PDF Link (Google Drive)'} ]
        };

        let currentCol = 'events'; let uploadedUrlsArray = []; let currentEditId = null; window.tableData = {}; 

        function adminLogin() {
            if(document.getElementById('adminUser').value==='Batrisi' && document.getElementById('adminPwd').value==='Bat@3232') document.getElementById('login-overlay').style.display='none';
            else document.getElementById('loginError').style.display='block';
        }

        function initCMS(col, title) {
            currentCol = col;
            document.getElementById('cms-title').innerText = "Manage " + title;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if(col === 'members') {
                document.getElementById('standardAddBtn').style.display = 'none';
                document.getElementById('csvUploadBtnContainer').style.display = 'flex';
            } else {
                document.getElementById('standardAddBtn').style.display = 'flex';
                document.getElementById('csvUploadBtnContainer').style.display = 'none';
            }
            fetchTableData();
        }

        function fetchTableData() {
            const body = document.getElementById('tableBody');
            const thead = document.getElementById('tableHeaders');

            if(currentCol === 'members') {
                thead.innerHTML = '<th>Member No.</th><th>Member Name</th><th>Address</th><th>Native Name</th><th>Mobile Number</th><th>Action</th>';
            } else {
                thead.innerHTML = '<th>Record Info</th><th>Media</th><th>Actions</th>';
            }

            let query = db.collection(currentCol).orderBy('timestamp', 'desc');
            if(currentCol === 'members') { query = query.limit(200); } // Prevent browser hang

            query.onSnapshot(snap => {
                let tempHtml = ""; 
                window.tableData = {}; 
                
                snap.forEach(doc => {
                    const d = doc.data();
                    window.tableData[doc.id] = d; 
                    
                    if(currentCol === 'members') {
                        tempHtml += `<tr>
                            <td><b>${d.memberNumber || '-'}</b></td>
                            <td style="color:var(--primary); font-weight:600;">${d.memberName || '-'}</td>
                            <td><small style="color:#64748b;">${d.address || '-'}</small></td>
                            <td>${d.nativeName || '-'}</td>
                            <td><i class="fa-solid fa-phone" style="color:#64748b; font-size:12px;"></i> ${d.mobileNumber || '-'}</td>
                            <td><button onclick="deleteDoc('${doc.id}')" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; font-size:16px;" title="Delete Member"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>`;
                    } else {
                        let mediaHtml = '';
                        if(d.images && d.images.length > 0) { mediaHtml = `<img src="${d.images[0]}"><br><small>+${d.images.length-1} more</small>`; } 
                        else if(d.image || d.photo) { mediaHtml = `<img src="${d.image || d.photo}" onerror="this.src='https://via.placeholder.com/40'">`; } 
                        else if(d.file) { mediaHtml = `<i class="fa-solid fa-file-pdf" style="font-size:30px; color:#ef4444;"></i>`; } 
                        else { mediaHtml = `<i class="fa-solid fa-file-lines" style="font-size:30px; color:gray;"></i>`; }

                        tempHtml += `<tr>
                            <td><b>${d.title || d.name || 'No Name'}</b><br><small style="color:gray;">${(d.desc || d.date || '').substring(0,40)}</small></td>
                            <td>${mediaHtml}</td>
                            <td>
                                <button onclick="editDoc('${doc.id}')" style="color:#2563eb; border:none; background:none; cursor:pointer; font-weight:bold; margin-right:15px;"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                                <button onclick="deleteDoc('${doc.id}')" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-trash"></i> Delete</button>
                            </td>
                        </tr>`;
                    }
                });

                if(currentCol === 'members' && snap.size >= 200) {
                    tempHtml += `<tr><td colspan="6" style="text-align:center; padding: 20px; color:#64748b; background:#f1f5f9; font-weight:bold;"><i class="fa-solid fa-circle-info"></i> Showing latest 200 records to keep Admin Panel fast. (All records are safe in Database).</td></tr>`;
                }

                body.innerHTML = tempHtml; 
            });
        }

        async function deleteAllMembers() {
            if(!confirm("⚠️ WARNING: This will delete ALL members from the database!\nAre you absolutely sure you want to clear the entire database?")) return;
            const t = document.getElementById('toast');
            t.innerText = "Deleting all data... Please wait (Do not close page)."; t.style.background = "#ef4444"; t.classList.add('show');
            try {
                const snapshot = await db.collection('members').get();
                if(snapshot.empty) { t.innerText = "Database is already empty!"; setTimeout(() => { t.classList.remove('show'); t.style.background = "#10b981"; }, 3000); return; }

                const batches = []; let currentBatch = db.batch(); let currentCount = 0;
                snapshot.docs.forEach((doc) => {
                    currentBatch.delete(doc.ref); currentCount++;
                    if(currentCount === 490) { batches.push(currentBatch.commit()); currentBatch = db.batch(); currentCount = 0; }
                });
                if(currentCount > 0) batches.push(currentBatch.commit());
                await Promise.all(batches);
                
                t.innerText = "All members deleted successfully!"; t.style.background = "#10b981"; setTimeout(() => t.classList.remove('show'), 3000);
            } catch(e) { alert("Error deleting: " + e.message); t.classList.remove('show'); t.style.background = "#10b981"; }
        }

        // ==============================================================
        // BULLETPROOF CSV READER (Fixes space issues in Excel Headers)
        // ==============================================================
        async function handleCSVUpload(el) {
            const file = el.files[0];
            if(!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const rows = results.data;
                    if(rows.length === 0) { alert("Empty CSV or invalid format!"); return; }
                    if(!confirm(`Found ${rows.length} records in CSV.\nDo you want to upload this data?`)) { el.value = ""; return; }

                    const t = document.getElementById('toast');
                    t.innerText = `Uploading ${rows.length} members... Please wait.`;
                    t.classList.add('show');

                    let batch = db.batch();
                    let count = 0;
                    
                    // Super Helper: Cleans all spaces and special chars to guarantee a match
                    const getVal = (rowObj, possibleKeys) => {
                        for(let k in rowObj) {
                            let cleanK = k.toLowerCase().replace(/[^a-z0-9]/g, ''); // Removes ALL spaces and special chars
                            if(possibleKeys.includes(cleanK)) return rowObj[k] ? String(rowObj[k]).trim() : '';
                        }
                        return '';
                    };

                    try {
                        for(let i=0; i<rows.length; i++) {
                            const row = rows[i];
                            const docRef = db.collection('members').doc();
                            
                            let dataObj = {
                                memberNumber: getVal(row, ['membernumber', 'memberno', 'no']),
                                memberName: getVal(row, ['membername', 'name']),
                                nativeName: getVal(row, ['nativename', 'native']),
                                mobileNumber: getVal(row, ['mobilenumber', 'mobileno', 'mobile', 'phone']),
                                address: getVal(row, ['address', 'add']),
                                timestamp: Date.now() + i 
                            };
                            
                            batch.set(docRef, dataObj);
                            count++;
                            
                            if(count === 490) { 
                                await batch.commit();
                                batch = db.batch();
                                count = 0;
                            }
                        }
                        if(count > 0) { await batch.commit(); }
                        
                        t.innerText = "CSV Upload Successful!";
                        setTimeout(() => t.classList.remove('show'), 3000);
                        el.value = ""; 
                    } catch(e) {
                        alert("Error uploading CSV: " + e.message);
                    }
                }
            });
        }

        // Standard Functions
        function openAddModal() { currentEditId = null; uploadedUrlsArray = []; document.getElementById('modalTitle').innerText = "Add New Record"; generateModalFields(); document.getElementById('cmsModal').style.display = 'flex'; }
        function editDoc(id) { currentEditId = id; uploadedUrlsArray = []; document.getElementById('modalTitle').innerText = "Edit Record"; generateModalFields(); const data = window.tableData[id]; setTimeout(() => { schemas[currentCol].forEach(f => { if(f.isMultiFile) { uploadedUrlsArray = data[f.key] || []; if(uploadedUrlsArray.length > 0) document.getElementById('manual_link').value = uploadedUrlsArray[0]; } else if(f.isFile) { uploadedUrlsArray = [data[f.key] || ""]; document.getElementById('manual_link').value = uploadedUrlsArray[0]; updatePreview(uploadedUrlsArray[0]); } else if(document.getElementById('f_'+f.key)) { document.getElementById('f_'+f.key).value = data[f.key] || ""; } }); }, 50); document.getElementById('cmsModal').style.display = 'flex'; }
        function generateModalFields() { const fields = schemas[currentCol]; let html = ""; fields.forEach(f => { if(f.isMultiFile) { html += `<div class="form-group" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #cbd5e1;"><label>${f.label}</label><input type="file" multiple accept="image/*" onchange="handleBulkUpload(this)"><p style="text-align:center; font-size:10px; margin:5px 0; font-weight:bold;">--- OR ---</p><input type="text" id="manual_link" placeholder="Paste Direct Image / G-Drive URL here"></div>`; } else if(f.isFile) { html += `<div class="form-group" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #cbd5e1;"><label>${f.label}</label><input type="file" onchange="handleSingleUpload(this)"><p style="text-align:center; font-size:10px; margin:5px 0; font-weight:bold;">--- OR ---</p><input type="text" id="manual_link" placeholder="Paste Direct Image URL here" oninput="updatePreview(this.value)"><img id="modal_prev" class="preview-img"></div>`; } else if(f.isArea) { html += `<div class="form-group"><label>${f.label}</label><textarea id="f_${f.key}" rows="4"></textarea></div>`; } else { html += `<div class="form-group"><label>${f.label}</label><input type="text" id="f_${f.key}"></div>`; } }); document.getElementById('dynamicFields').innerHTML = html; }
        function convertDriveLink(url) { if(!url) return ""; if(url.includes("drive.google.com/file/d/")) { let id = url.split("/d/")[1].split("/")[0]; return `https://drive.google.com/uc?export=view&id=${id}`; } return url; }
        async function handleBulkUpload(el) { const files = el.files; if(!files.length) return; const btn = document.getElementById('saveBtn'); btn.disabled = true; const prog = document.getElementById('uploadProgress'); prog.style.display = 'block'; uploadedUrlsArray = []; let successCount = 0; for(let i=0; i<files.length; i++) { prog.innerText = `Uploading: ${i+1} of ${files.length} Files... Please Wait!`; const fd = new FormData(); fd.append("image", files[i]); try { const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd }); const data = await res.json(); if(data.data && data.data.url) { uploadedUrlsArray.push(data.data.url); successCount++; } } catch(e) { console.log("Failed", i); } } prog.innerText = `Upload Complete! (${successCount} Images Ready to Save)`; prog.style.color = "green"; btn.disabled = false; }
        async function handleSingleUpload(el) { const file = el.files[0]; if(!file) return; const btn = document.getElementById('saveBtn'); btn.innerText = "UPLOADING..."; btn.disabled = true; const fd = new FormData(); fd.append("image", file); try { const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd }); const data = await res.json(); uploadedUrlsArray = [data.data.url]; updatePreview(data.data.url); } catch(e) { alert("Upload Failed!"); } btn.innerText = "SAVE RECORD"; btn.disabled = false; }
        function updatePreview(url) { const img = document.getElementById('modal_prev'); if(img) { if(url && !url.includes('.pdf')) { img.src = url; img.style.display = 'block'; } else { img.style.display = 'none'; } } }
        async function saveDataToFirebase() { const btn = document.getElementById('saveBtn'); btn.innerText = "SAVING..."; btn.disabled = true; const fields = schemas[currentCol]; let dataObj = {}; fields.forEach(f => { if(f.isMultiFile) { let manual = document.getElementById('manual_link').value; if(manual) { uploadedUrlsArray.push(convertDriveLink(manual)); } dataObj[f.key] = uploadedUrlsArray; } else if(f.isFile) { let manual = document.getElementById('manual_link').value; dataObj[f.key] = manual || (uploadedUrlsArray.length > 0 ? uploadedUrlsArray[0] : ""); } else { dataObj[f.key] = document.getElementById('f_'+f.key).value; } }); try { if (currentEditId) { await db.collection(currentCol).doc(currentEditId).update(dataObj); } else { dataObj.timestamp = Date.now(); await db.collection(currentCol).add(dataObj); } closeCMSModal(); showToast(); } catch(e) { alert("Database Error! Please check your connection."); } btn.innerText = "SAVE RECORD"; btn.disabled = false; }
        function deleteDoc(id) { if(confirm("Are you sure you want to delete this record?")) db.collection(currentCol).doc(id).delete(); }
        function closeCMSModal() { document.getElementById('cmsModal').style.display = 'none'; document.getElementById('uploadProgress').style.display='none'; }
        function showToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
        
        initCMS('events', 'Events');
    </script>

    <!-- AI ASSISTANT WIDGET START -->
    <style>

    .sbj-ai-close { background:transparent; border:none; color:white; font-size:20px; cursor:pointer; opacity:0.7; transition:0.2s; }

    .sbj-ai-body { flex:1; padding:15px; overflow-y:auto; background:#f8fafc; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
    .sbj-ai-body::-webkit-scrollbar { width:5px; }
    .sbj-ai-body::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
    .sbj-msg { max-width:85%; padding:10px 14px; border-radius:15px; font-size:13.5px; line-height:1.5; word-wrap:break-word; white-space:pre-wrap; }
    .sbj-msg-bot { background:white; color:#334155; align-self:flex-start; border-bottom-left-radius:2px; box-shadow:0 2px 5px rgba(0,0,0,0.05); border:1px solid #e2e8f0; }
    .sbj-msg-user { background:#10b981; color:white; align-self:flex-end; border-bottom-right-radius:2px; box-shadow:0 2px 5px rgba(16,185,129,0.2); }
    .sbj-ai-footer { padding:15px; background:white; border-top:1px solid #e2e8f0; display:flex; gap:10px; align-items:center; }
    .sbj-ai-input { flex:1; padding:10px 15px; border:1px solid #e2e8f0; border-radius:25px; outline:none; font-size:14px; transition:0.2s; background:#f8fafc; }
    .sbj-ai-input:focus { border-color:#10b981; background:white; }
    .sbj-ai-send { width:40px; height:40px; border-radius:50%; background:#10b981; color:white; border:none; display:flex; justify-content:center; align-items:center; cursor:pointer; transition:0.2s; }
    .sbj-ai-send:hover { background:#059669; transform:scale(1.05); }
    .sbj-ai-send:disabled { background:#cbd5e1; cursor:not-allowed; transform:none; }
    .sbj-typing { display:none; align-self:flex-start; background:transparent; box-shadow:none; border:none; padding:5px 10px; }
    .sbj-typing span { display:inline-block; width:6px; height:6px; background:#cbd5e1; border-radius:50%; margin:0 2px; animation:sbj-bounce 1.4s infinite ease-in-out both; }
    .sbj-typing span:nth-child(1) { animation-delay:-0.32s; }
    .sbj-typing span:nth-child(2) { animation-delay:-0.16s; }
    @keyframes sbj-bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
    @media (max-width:480px) { .sbj-ai-window { width:calc(100vw - 40px); height:calc(100vh - 120px); bottom:70px; right:-5px; } }
    </style>
    <div class="sbj-ai-widget">
        <button class="sbj-ai-btn" id="sbj-ai-toggle" onclick="sbjToggleChat()"><i class="fa-solid fa-robot"></i></button>
        <div class="sbj-ai-window" id="sbj-ai-window">
            <div class="sbj-ai-header">
                <div class="sbj-ai-header-info">
                    <div class="sbj-ai-avatar"><i class="fa-solid fa-robot"></i></div>
                    <div><p class="sbj-ai-title">Batrisi AI Assistant</p><p class="sbj-ai-subtitle">Online | Ready to help</p></div>
                </div>
                <button class="sbj-ai-close" onclick="sbjToggleChat()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="sbj-ai-body" id="sbj-ai-body">
                <div class="sbj-typing" id="sbj-ai-typing"><span></span><span></span><span></span></div>
            </div>
            <div class="sbj-ai-footer">
                <input type="text" id="sbj-ai-input" class="sbj-ai-input" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sbjSendMessage()">
                <button id="sbj-ai-send" class="sbj-ai-send" onclick="sbjSendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

    <script>
    if(!document.querySelector('link[href*="font-awesome"]')){let fa=document.createElement('link');fa.rel='stylesheet';fa.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';document.head.appendChild(fa);}
    const SBJ_GEMINI_API_KEY="AIzaSyAcXveCbWpgHYk-XNP85eXo0pmY2Dq9cF4";
    const sbjAiWindow=document.getElementById('sbj-ai-window'),sbjAiBody=document.getElementById('sbj-ai-body'),sbjAiInput=document.getElementById('sbj-ai-input'),sbjAiTyping=document.getElementById('sbj-ai-typing'),sbjAiSendBtn=document.getElementById('sbj-ai-send');
    let sbjChatHistory=[],sbjIsFirstOpen=true;
    const sbjSystemContext="You are the official AI Assistant for 'Shree Batrisi Jain Co-Op Education Society Ltd.' (SBJCESL). Your goal is to assist members with: Membership, Scholarship, Donation, ID Card, Certificate, Marriage Biodata, Event Registration, Member Help, Notebook Registration, Medical App, and Society/Trust info. Understand Hinglish, English, and Gujarati. Reply naturally in the user's language. Always be respectful. Answer general real-world questions accurately too. Do not invent fake member data. Keep answers concise, clear, and well-formatted.";
    function sbjToggleChat(){sbjAiWindow.classList.toggle('sbj-active');if(sbjAiWindow.classList.contains('sbj-active')&&sbjIsFirstOpen){sbjIsFirstOpen=false;setTimeout(()=>{sbjAppendMessage("પ્રણામ જય જિનેન્દ્ર,\nશ્રી બત્રીસી જૈન કો.ઓ એજ્યુકેશન સોસાયટી લિમિટેડ માં તમારું સ્વાગત છે\nહું છુ તમારી AI મિત્ર હું તમારી સુ મદદ કરી સકુ છુ ?",'bot');},400);}if(sbjAiWindow.classList.contains('sbj-active')){sbjAiInput.focus();}}
    function sbjAppendMessage(text,sender){const msgDiv=document.createElement('div');msgDiv.classList.add('sbj-msg',sender==='user'?'sbj-msg-user':'sbj-msg-bot');msgDiv.innerText=text;sbjAiBody.insertBefore(msgDiv,sbjAiTyping);sbjAiBody.scrollTop=sbjAiBody.scrollHeight;}
    async function sbjSendMessage(){const text=sbjAiInput.value.trim();if(!text)return;sbjAppendMessage(text,'user');sbjAiInput.value='';sbjAiInput.disabled=true;sbjAiSendBtn.disabled=true;sbjAiTyping.style.display='block';sbjAiBody.scrollTop=sbjAiBody.scrollHeight;sbjChatHistory.push({"role":"user","parts":[{"text":text}]});try{const response=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${SBJ_GEMINI_API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:sbjChatHistory,systemInstruction:{parts:[{text:sbjSystemContext}]},generationConfig:{temperature:0.7,maxOutputTokens:800}})});const data=await response.json();sbjAiTyping.style.display='none';if(data.candidates&&data.candidates.length>0){let botReply=data.candidates[0].content.parts[0].text;botReply=botReply.replace(/\*\*(.*?)\*\*/g,'$1');sbjAppendMessage(botReply,'bot');sbjChatHistory.push({"role":"model","parts":[{"text":botReply}]});}else{sbjAppendMessage("Sorry, technical issue. Try again later.",'bot');}}catch(err){console.error("Gemini API Error:",err);sbjAiTyping.style.display='none';sbjAppendMessage("Network issue or API error.",'bot');}sbjAiInput.disabled=false;sbjAiSendBtn.disabled=false;sbjAiInput.focus();}
    </script>
