<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Batrisi Jain Co-Op. Education Society Ltd.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Swiper CSS (Advanced 3D Slider) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #ea580c; --primary-dark: #c2410c; --secondary: #fbbf24; --dark: #0f172a; --darker: #1e293b; --light: #f8fafc; --white: #ffffff; --shadow: 0 10px 25px -5px rgba(0,0,0,0.1); --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background: var(--light); color: var(--dark); overflow-x: hidden; }

        /* NAVBAR */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: rgba(255,255,255,0.98); backdrop-filter: blur(15px); padding: 12px 4%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); z-index: 1000; }
        .nav-left { display: flex; align-items: center; }
        .logo { text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .brand-logo-img { height: 45px; width: 45px; object-fit: contain; }
        .nav-brand-text { display: flex; flex-direction: column; line-height: 1.1; }
        .nav-brand-text .title { font-size: 22px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
        .nav-brand-text .title span { color: var(--primary); }
        .nav-brand-text .subtitle { font-size: 12px; font-weight: 600; color: #64748b; }
        .nav-right { display: flex; align-items: center; }
        .nav-links { display: flex; gap: 22px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--darker); font-weight: 600; font-size: 15px; transition: var(--transition); cursor: pointer; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .nav-actions { display: flex; gap: 15px; margin-left: 20px; padding-left: 20px; border-left: 2px solid #e2e8f0; }

        .btn-legacy { background: linear-gradient(135deg, #1e293b, #0f172a); color: var(--white) !important; padding: 10px 24px; border-radius: 50px; font-weight: 600; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-legacy:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(15, 23, 42, 0.4); }
        .btn-saffron { background: linear-gradient(135deg, #f97316, #ea580c) !important; }

        @media (max-width: 992px) { .navbar { flex-direction: column; padding: 10px 4%; gap: 10px; } .nav-right { width: 100%; justify-content: space-between; overflow-x: auto; } .nav-actions { border: none; padding: 0; } }

        /* SPA VIEWS */
        .page-view { display: none; padding-top: 80px; min-height: 100vh; animation: fadeIn 0.4s ease-in-out; }
        .page-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* HERO & FULL SIZE 3D SWIPER */
        .hero { min-height: 100vh; background: linear-gradient(rgba(15,23,42,0.95), rgba(234,88,12,0.85)), url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=2070') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--white); padding: 100px 20px 40px; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .hero-top-text { text-align: center; margin-bottom: 20px; z-index: 10; }
        .hero-logo { height: 80px; width: 80px; background: white; border-radius: 50%; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: float 3s infinite ease-in-out; margin-bottom: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        /* MEGA SLIDER */
        .swiper { width: 100%; max-width: 1400px; padding: 20px 0 60px; }
        .swiper-slide { width: 600px; height: 400px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); overflow: hidden; position: relative; border: 4px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; background-size: cover; background-position: center; }
        @media (max-width: 768px) { .swiper-slide { width: 90%; height: 350px; } }
        .swiper-slide:hover { border-color: var(--secondary); }
        .slide-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 30px 30px; background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.6), transparent); text-align: left; }
        .slide-badge { background: var(--primary); padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(234,88,12,0.5); }
        .slide-title { font-size: 26px; font-weight: 800; line-height: 1.3; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .click-hint { font-size: 12px; color: var(--secondary); margin-top: 8px; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .section-title { text-align: center; font-size: 36px; font-weight: 800; margin-bottom: 40px; color: var(--dark); }
        .section-title span { color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: var(--transition); border: 1px solid #f1f5f9; cursor: pointer; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15); }
        .card-img { width: 100%; height: 250px; object-fit: cover; }
        .multi-photo-badge { position: absolute; top: 15px; right: 15px; background: rgba(15,23,42,0.8); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); }

        /* ADVANCED LIGHTBOX FOR MULTIPLE IMAGES */
        #lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 4000; justify-content: center; align-items: center; flex-direction: column; }
        #lightbox img { max-width: 85%; max-height: 80vh; border-radius: 12px; border: 4px solid var(--white); box-shadow: 0 20px 50px rgba(0,0,0,0.7); object-fit: contain; }
        #lightbox-close { position: absolute; top: 30px; right: 40px; color: white; font-size: 40px; cursor: pointer; z-index: 4010; }
        .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 50px; color: white; cursor: pointer; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50%; transition: 0.3s; z-index: 4010; }
        .lb-nav:hover { background: var(--primary); }
        #lb-prev { left: 30px; }
        #lb-next { right: 30px; }
        #lb-counter { color: white; margin-top: 15px; font-size: 16px; font-weight: bold; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="#home" class="logo">
                <img src="./logo.png" alt="Logo" class="brand-logo-img">
                <div class="nav-brand-text">
                    <div class="title">Shree <span>Batrisi</span></div>
                    <div class="subtitle">Jain Co-Op. Education Society Ltd.</div>
                </div>
            </a>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="#home" class="active">Home</a>
                <a href="#about">About</a>
                <a href="#events">Events</a>
                <a href="#gallery">Gallery</a>
                <a href="#media">Media</a>
                <a href="#committee">Committee</a>
            </div>
            <div class="nav-actions">
                <a href="admin.html" class="btn-legacy btn-saffron" target="_blank"><i class="fa-solid fa-shield"></i> Admin</a>
            </div>
        </div>
    </nav>

    <div id="view-home" class="page-view active">
        <div class="hero">
            <div class="hero-top-text">
                <img src="./logo.png" alt="Logo" class="hero-logo">
                <h1 style="font-size:40px; font-weight:800;">Welcome to Batrisi Samaj</h1>
            </div>
            
            <!-- MEGA 3D SLIDER -->
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="hero-slider-wrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </div>
    </div>

    <!-- GALLERY VIEW -->
    <div id="view-gallery" class="page-view">
        <div class="container">
            <h2 class="section-title">Photo <span>Gallery</span></h2>
            <div class="grid" id="gallery-grid"></div>
        </div>
    </div>

    <!-- MEDIA VIEW -->
    <div id="view-media" class="page-view">
        <div class="container">
            <h2 class="section-title">Media <span>Coverage</span></h2>
            <div class="grid" id="media-grid"></div>
        </div>
    </div>
    
    <!-- ADVANCED LIGHTBOX -->
    <div id="lightbox">
        <i class="fa-solid fa-xmark" id="lightbox-close" onclick="closeLightbox()"></i>
        <i class="fa-solid fa-chevron-left lb-nav" id="lb-prev" onclick="changeLightboxImg(-1)"></i>
        <img id="lightbox-img" src="">
        <i class="fa-solid fa-chevron-right lb-nav" id="lb-next" onclick="changeLightboxImg(1)"></i>
        <p id="lightbox-caption" style="color:white; margin-top:15px; font-size:22px; font-weight:700;"></p>
        <p id="lb-counter"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDbZ4T8264CDQ5LSoH_4L0luB5VKQbiqkU", authDomain: "batrisi-latest-app.firebaseapp.com", projectId: "batrisi-latest-app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Router
        function handleRoute() { 
            let hash = window.location.hash || '#home'; 
            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active')); 
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active')); 
            let targetView = document.getElementById('view-' + hash.substring(1)); 
            if(targetView) targetView.classList.add('active'); 
            let activeLink = document.querySelector(`.nav-links a[href="${hash}"]`); 
            if(activeLink) activeLink.classList.add('active'); 
            window.scrollTo(0,0); 
        }
        window.addEventListener('hashchange', handleRoute); 
        window.addEventListener('load', () => { handleRoute(); fetchHeroSliderData(); fetchAllData(); });

        // Jump to section when clicking slider
        function sliderJumpTo(type) {
            window.location.hash = `#${type.toLowerCase()}`;
        }

        // Fetch Data for Mega Slider
        async function fetchHeroSliderData() {
            try {
                const [gallerySnap, mediaSnap] = await Promise.all([
                    db.collection('gallery').orderBy('timestamp', 'desc').limit(5).get(),
                    db.collection('media').orderBy('timestamp', 'desc').limit(3).get()
                ]);

                let slides = [];
                gallerySnap.forEach(doc => slides.push({...doc.data(), type: 'Gallery'}));
                mediaSnap.forEach(doc => slides.push({...doc.data(), type: 'Media'}));

                slides.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                
                let sliderHtml = '';
                slides.forEach(item => {
                    // Handle array of images or single image
                    let coverImg = (item.images && item.images.length > 0) ? item.images[0] : (item.image || 'https://via.placeholder.com/600x400');
                    sliderHtml += `
                        <div class="swiper-slide" style="background-image: url('${coverImg}')" onclick="sliderJumpTo('${item.type}')">
                            <div class="slide-overlay">
                                <span class="slide-badge">${item.type}</span>
                                <div class="slide-title">${item.title}</div>
                                <div class="click-hint">Click to view in ${item.type} <i class="fa-solid fa-arrow-right"></i></div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('hero-slider-wrapper').innerHTML = sliderHtml;

                // CINEMATIC 3D SWIPER SETUP
                new Swiper(".mySwiper", {
                    effect: "coverflow",
                    grabCursor: true,
                    centeredSlides: true,
                    slidesPerView: "auto",
                    loop: true,
                    autoplay: { delay: 3000, disableOnInteraction: false },
                    coverflowEffect: { rotate: 20, stretch: 0, depth: 400, modifier: 1, slideShadows: true },
                    pagination: { el: ".swiper-pagination", clickable: true },
                });
            } catch(e) { console.log(e); }
        }

        // Lightbox Logic for Arrays
        let currentLbImages = [];
        let currentLbIndex = 0;

        function openLightbox(imgArray, title) { 
            currentLbImages = Array.isArray(imgArray) ? imgArray : [imgArray];
            currentLbIndex = 0;
            document.getElementById('lightbox-caption').innerText = title || ''; 
            updateLightboxView();
            document.getElementById('lightbox').style.display = 'flex'; 
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        
        function changeLightboxImg(dir) {
            currentLbIndex += dir;
            if(currentLbIndex >= currentLbImages.length) currentLbIndex = 0;
            if(currentLbIndex < 0) currentLbIndex = currentLbImages.length - 1;
            updateLightboxView();
        }

        function updateLightboxView() {
            document.getElementById('lightbox-img').src = currentLbImages[currentLbIndex];
            
            // Hide/Show arrows if only 1 image
            let navs = document.querySelectorAll('.lb-nav');
            if(currentLbImages.length <= 1) {
                navs.forEach(n => n.style.display = 'none');
                document.getElementById('lb-counter').style.display = 'none';
            } else {
                navs.forEach(n => n.style.display = 'block');
                document.getElementById('lb-counter').style.display = 'block';
                document.getElementById('lb-counter').innerText = `Image ${currentLbIndex + 1} of ${currentLbImages.length}`;
            }
        }

        // Fetch Grid Data
        function fetchAllData() {
            db.collection('gallery').orderBy('timestamp', 'desc').onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => { 
                    let d = doc.data(); 
                    let imgArr = d.images && d.images.length > 0 ? d.images : [d.image]; // Fallback for old data
                    let cover = imgArr[0];
                    let badge = imgArr.length > 1 ? `<span class="multi-photo-badge"><i class="fa-regular fa-images"></i> ${imgArr.length} Photos</span>` : '';
                    
                    html += `<div class="card" style="position:relative;" onclick='openLightbox(${JSON.stringify(imgArr)}, "${d.title.replace(/"/g, '&quot;')}")'>
                                ${badge}
                                <img src="${cover}" class="card-img">
                                <div style="padding:15px; text-align:center;"><p style="font-weight:700; color:var(--dark);">${d.title}</p></div>
                             </div>`; 
                });
                document.getElementById('gallery-grid').innerHTML = html;
            });

            db.collection('media').orderBy('timestamp', 'desc').onSnapshot(snap => {
                let html = '';
                snap.forEach(doc => { 
                    let d = doc.data(); 
                    let imgArr = d.images && d.images.length > 0 ? d.images : [d.image];
                    let cover = imgArr[0];
                    let badge = imgArr.length > 1 ? `<span class="multi-photo-badge"><i class="fa-regular fa-images"></i> ${imgArr.length} Pages</span>` : '';

                    html += `<div class="card" style="position:relative;" onclick='openLightbox(${JSON.stringify(imgArr)}, "${d.title.replace(/"/g, '&quot;')}")'>
                                ${badge}
                                <img src="${cover}" class="card-img">
                                <div style="padding:15px;">
                                    <h3 style="font-size:18px; margin-bottom:5px;">${d.title}</h3>
                                    <span style="color:gray; font-size:12px;">${d.date || ''}</span>
                                </div>
                             </div>`; 
                });
                document.getElementById('media-grid').innerHTML = html;
            });
        }
    </script>
</body>
</html>
